# ─── Build Configuration ──────────────────────────────────────────────────────
[build]
  command         = "npm run build"
  publish         = "dist"
  functions       = "netlify/functions"
  ignore          = "git log -1 --pretty=%B | grep -q '\\[skip ci\\]'"

# ─── SPA Routing: all non-function paths fall back to index.html ─────────────
[[redirects]]
  from   = "/api/save-blog"
  to     = "/.netlify/functions/save-blog"
  status = 200

[[redirects]]
  from   = "/api/delete-blog"
  to     = "/.netlify/functions/delete-blog"
  status = 200

# Catch-all SPA fallback (must be last)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Functions Runtime ────────────────────────────────────────────────────────
[functions]
  node_bundler = "esbuild"
