# =========================================================
# 📌 PORTFOLIO DATA CONFIGURATION FILE
# =========================================================
# This YAML file controls the entire portfolio dynamically.
# You only need to edit this file to update content.
#
# =========================================================
# 📚 TABLE OF CONTENTS
# =========================================================
# 1. home        → Homepage settings
# 2. personal    → Basic personal info
# 3. hero        → Landing section content
# 4. stats       → Quick stats display
# 5. about       → About section
# 6. education   → Academic details
# 7. experience  → Work experience
# 8. skills      → Skill categories
# 9. techStack   → Tools & technologies
# 10. services   → What you offer
# 11. projects   → Portfolio projects
# 12. emailjs    → Contact form config
# 13. resume     → Resume button config
#
# =========================================================
# 🧠 USE CASE
# =========================================================
# 👉 Edit this file → Portfolio updates automatically
# 👉 Used by chatbot (RAG context)
# 👉 Used by UI (cards, sections, filters)
# =========================================================
# =========================================================
# 📌 PORTFOLIO CONFIG (COLLAPSIBLE VERSION)
# =========================================================

# region HOME 
home:
  featuredProjectsCount: 4
# endregion

# region GLOBAL SETTINGS

# 🌟 4. Soft Premium Gold (muted, classy)

# Less neon, more “premium UI” look.
settings:
  ropeLightColors: ["#eab308", "#67e8f9", "#6366f1", "#a855f7"]
  ropeLightSpeed: 10
  ropeLightThickness: 2
  ropeLightGlowIntensity: 6

  ropeLightColorLight: "#fde68a"
  ropeLightColorDark: "#a16207"

  # Global Text Hover Interaction
  textHoverColors: ["#22d3ee", "#fbbf24", "#6366f1", "#8b5cf6"]
  textTransitionSpeed: "0.8s"
  textAnimationSpeed: "4s"
  textGlowIntensity: 1.3
# endregion

